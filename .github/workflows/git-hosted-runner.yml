# # Goal Create a workflow with 3 jobs, each on a different OS:
# ubuntu-latest
# windows-latest
# macos-latest
# In each job, print:
# The OS name
# The runner's hostname
# The current user running the job
# Watch all 3 run in parallel



name: GitHub Hoster Runners

on:
  push:

jobs:
  ubuntu-os:
    runs-on: ubuntu-latest

    steps:
      - name: Print the ubuntu-os info
        run: |
          uname -o
          hostname
          whoami

  windows-os:
    runs-on: windows-latest

    steps:
      - name: Print the windows-os info
        run: |
          cmd /c ver 
          hostname
          whoami

  macos-os:
    runs-on: macos-latest

    steps:
      - name: Print the macos-os info
        run: |
          uname -o 
          hostname
          whoami


    
        
